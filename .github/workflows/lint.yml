name: Lint
on:
    push:
    pull_request:
    workflow_dispatch:

permissions: {}

concurrency:
    group: ${{github.workflow}}-${{github.event.pull_request.number||github.ref}}
    cancel-in-progress: true

jobs:
    format:
        name: Format
        runs-on: ubuntu-24.04
        permissions:
            contents: write # Needed to push
            actions: write # Allow formatting actions too

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  token: ${{secrets.TOKEN||github.token}}
                  persist-credentials: true

            - name: Setup Node.JS
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

            - name: Install
              run: npm ci

            - name: Format JS
              run: npm run format

            - name: Format Python
              uses: psf/black@35ea67920b7f6ac8e09be1c47278752b1e827f76 # 26.3.0
              with:
                  options: ""
                  jupyter: true

            - name: Assert clean
              if: startsWith(github.ref_name, 'dependabot/') == true
              run: if [[ `git status --porcelain` ]]; then exit 1; fi

            - name: Commit
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
              with:
                  commit_message: Format

    analyze:
        name: Analyze
        runs-on: ubuntu-24.04
        permissions:
            security-events: write # Used by github/codeql-action
        strategy:
            fail-fast: false
            matrix:
                language: [javascript, python]

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup CodeQL
              uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
              with:
                  languages: ${{matrix.language}}
                  queries: security-and-quality

            - name: Analyze
              uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

    types:
        name: Typecheck JS
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup Node.JS
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

            - name: Install
              run: npm ci

            - name: Typecheck
              run: npm run types
