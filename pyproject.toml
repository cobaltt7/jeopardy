[tool.poetry]
name = "jeopardy"
version = "0.0.1"
description = ""
authors = ["cobaltt7"]
license = "MIT"

[tool.poetry.dependencies]
python = "3.11.0"
pandas = "2.3.0"
flask = {extras = ["async"], version = "3.1.1"}
flask-socketio = "5.5.1"

[tool.poetry.group.dev.dependencies]
black = {extras = ["jupyter"], git = "https://github.com/psf/black", rev = "89f36108caaa8e3281779a00e3fc14db1cacbf7d", allow-prereleases = true}
ipykernel = "6.29.5"
notebook = "7.4.4"
pandas-stubs = "2.2.3.250527"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
skip-magic-trailing-comma = true
preview = true
unstable = true
