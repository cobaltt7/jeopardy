[tool.poetry]
name = "jeopardy"
version = "0.0.1"
description = ""
authors = ["cobaltt7"]
license = "MIT"

[tool.poetry.dependencies]
python = "3.11.0"
pandas = "2.1.4"
flask = {extras = ["async"], version = "3.1.0"}
flask-socketio = "5.4.1"

[tool.poetry.group.dev.dependencies]
black = {extras = ["jupyter"], git = "https://github.com/psf/black", rev = "fdabd424e237f89d8b3f53cf8157902bbf850e45", allow-prereleases = true}
ipykernel = "6.29.5"
notebook = "7.2.2"
pandas-stubs = "2.1.4.231227"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
skip-magic-trailing-comma = true
preview = true
unstable = true
